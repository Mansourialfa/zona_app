name: Compile ZONA Flutter App

# Se déclenche quand on push sur la branche "main"
on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Configurer Java (Requis pour Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Ou la dernière version stable
          channel: 'stable'

      - name: Installer les dépendances
        run: flutter pub get

      - name: Compiler le fichier APK
        run: flutter build apk --release

      - name: Uploader l'APK généré (Artifact)
        uses: actions/upload-artifact@v3
        with:
          name: ZONA-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Compiler le fichier AAB (Pour le Google Play Store)
        run: flutter build appbundle --release

      - name: Uploader l'AAB généré (Artifact)
        uses: actions/upload-artifact@v3
        with:
          name: ZONA-Android-AAB
          path: build/app/outputs/bundle/release/app-release.aab